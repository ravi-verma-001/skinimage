<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <!-- Style overrides for fonts -->
  <style>
    .bold-text {
      font-family: 'Playfair Display', 'Didot', 'Georgia', serif;
      font-weight: 700;
      fill: #1c1917; /* stone-900 */
      font-size: 80px;
      letter-spacing: 2px;
    }
    .thin-text {
      font-family: 'Montserrat', 'Inter', 'Helvetica', sans-serif;
      font-weight: 300;
      fill: #1c1917; /* stone-900 */
      font-size: 42px;
      letter-spacing: 8px;
    }
    .dropper {
      fill: #065f46; /* emerald-800 */
    }
  </style>
  
  <g transform="translate(10, 10)">
    <!-- SKiN row -->
    <text x="50" y="90" class="bold-text">SK</text>
    
    <!-- Dropper icon in place of "i" -->
    <g transform="translate(162, 28) scale(1.1)">
      <!-- Dropper bulb -->
      <path d="M 12 10 Q 18 10 18 15 L 18 20 Q 18 23 15 25 L 15 35 L 9 35 L 9 25 Q 6 23 6 20 L 6 15 Q 6 10 12 10 Z" class="dropper" />
      <!-- Dropper stem -->
      <rect x="10.5" y="35" width="3" height="25" class="dropper" />
      <!-- Dropper tip -->
      <path d="M 10.5 60 L 13.5 60 L 12 65 Z" class="dropper" />
      <!-- Dropping droplet -->
      <path d="M 12 72 Q 13.5 72 13.5 74 Q 13.5 76 12 76 Q 10.5 76 10.5 74 Q 10.5 72 12 72 Z" class="dropper" />
    </g>
    
    <!-- "n" in SKiN -->
    <text x="200" y="90" class="bold-text">n</text>
    
    <!-- IMAGE row -->
    <text x="57" y="150" class="thin-text">IMAGE</text>
  </g>
</svg>
